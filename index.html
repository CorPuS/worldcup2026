<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>World Cup 2026 TOTO</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-4">

  <div class="card shadow">

    <!-- HEADER -->
    <div class="card-header text-white d-flex justify-content-between align-items-start"
         style="background-color:#0d6efd;
                background-image:url(media/img/logomini.png);
                background-repeat:no-repeat;
                background-position:right center;">

      <div>
        <h1 class="h3 mb-1">World Cup 2026 TOTO</h1>

        <small class="text-light">
          Predict all match results and compete with colleagues
        </small>
      </div>

      <div id="user-info" class="text-light text-secondary mb-3"></div>
      <button id="logout-btn" class="btn btn-warning btn-sm" style="display:none;" onclick="logout()">
        Logout
      </button>

    </div>

    <!-- ===================== -->
    <!-- LOGIN VIEW -->
    <!-- ===================== -->
    <div id="login-view" class="card-body text-center">

      <h3>Welcome to the Prediction Game</h3>

      <p class="text-muted">
        Please log in with Google to continue
      </p>

      <button class="btn btn-primary btn-lg mt-3" onclick="login()">
        Login with Google
      </button>

      <hr class="my-4">

      <!-- PUBLIC RANKINGS -->
      <div class="card">
        <div class="card-header">
          Current Rankings
        </div>
        <div class="card-body">
          <div id="public-rankings"></div>
        </div>
      </div>

    </div>

    <!-- ===================== -->
    <!-- APP VIEW -->
    <!-- ===================== -->
    <div id="app-view" class="card-body" style="display:none;">

      <div class="row g-4">

        <!-- MATCHES -->
        <div class="col-md-8">

          <div class="card">

            <div class="card-header">
              Matches
            </div>

            <div class="card-body p-0">

              <div class="table-responsive">

                <table class="table table-striped table-hover mb-0">

                  <thead class="table-light">
                    <tr>
                      <th>Date</th>
                      <th class="text-end">Team A</th>
                      <th class="text-center">Guess</th>
                      <th class="text-center">Result</th>
                      <th>Team B</th>
                      <th>Score</th>
                    </tr>
                  </thead>

                  <tbody id="matches"></tbody>

                </table>

              </div>

            </div>
          </div>

        </div>

        <!-- LEADERBOARD -->
        <div class="col-md-4">

          <div class="card">

            <div class="card-header">
              Scoreboard
            </div>

            <div class="card-body">
              <div id="leaderboard"></div>
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

<style>
  .flag {
    width: 20px;
    height: 14px;
    margin-right: 6px;
    border-radius: 2px;
  }
</style>

</body>
</html>
